<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-E4MCBFBTTZ"></script>
<script>

  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-E4MCBFBTTZ');

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout — AURA</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0b0b0b;--surface:#141414;--card:#1c1c1c;--border:#2a2a2a;--accent:#c9a97f;--accent2:#e8d5b4;--text:#f0ece4;--muted:#7a7672;--danger:#e07070;--success:#6db88a;--font-d:'Cormorant Garamond',serif;--font-b:'DM Sans',sans-serif;--r:3px;--tr:.28s cubic-bezier(.4,0,.2,1);}
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--font-b);font-weight:300;overflow-x:hidden;}

  nav{position:sticky;top:0;z-index:100;background:rgba(11,11,11,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 3rem;height:68px;}
  .logo{font-family:var(--font-d);font-size:1.8rem;font-weight:300;letter-spacing:.3em;color:var(--accent);text-decoration:none;}
  .nav-links{display:flex;gap:2.5rem;align-items:center;}
  .nav-links a{font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color var(--tr);}
  .nav-links a:hover{color:var(--text);}
  .cart-nav{display:flex;align-items:center;gap:.5rem;text-decoration:none;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.5rem 1.1rem;border-radius:var(--r);font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;transition:all var(--tr);}
  .cart-nav:hover{border-color:var(--accent);color:var(--accent);}
  .cart-badge{background:var(--accent);color:#0b0b0b;border-radius:50%;width:19px;height:19px;font-size:.62rem;font-weight:700;display:flex;align-items:center;justify-content:center;}

  .page-hd{padding:2.5rem 3rem 0;}
  .page-hd h1{font-family:var(--font-d);font-size:2.5rem;font-weight:300;}
  .divider{height:1px;background:var(--border);margin:1.2rem 3rem 0;}

  /* STEP BAR */
  .step-bar{display:flex;align-items:center;padding:2rem 3rem;}
  .step{display:flex;align-items:center;}
  .s-num{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.76rem;font-weight:500;flex-shrink:0;border:1px solid var(--border);background:var(--surface);color:var(--muted);transition:all var(--tr);}
  .step.active .s-num{background:var(--accent);color:#0b0b0b;border-color:var(--accent);}
  .step.done .s-num{background:var(--success);color:#fff;border-color:var(--success);}
  .s-lbl{font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-left:.5rem;transition:color var(--tr);}
  .step.active .s-lbl{color:var(--accent);}
  .step.done .s-lbl{color:var(--success);}
  .s-line{flex:1;height:1px;background:var(--border);margin:0 .75rem;}

  /* LAYOUT */
  .co-layout{display:grid;grid-template-columns:1fr 330px;gap:2.5rem;padding:0 3rem 4rem;}

  /* FORM */
  .form-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:2rem;}
  .panel{display:none;}
  .panel.active{display:block;animation:fade .3s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .f-section-ttl{font-family:var(--font-d);font-size:1.3rem;margin-bottom:1.4rem;padding-bottom:.7rem;border-bottom:1px solid var(--border);}
  .f-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
  .fg{margin-bottom:1rem;}
  .fl{display:block;font-size:.67rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem;}
  .fi{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.72rem .95rem;border-radius:var(--r);font-family:var(--font-b);font-size:.88rem;transition:border-color var(--tr);outline:none;}
  .fi:focus{border-color:var(--accent);}
  .fi.invalid{border-color:var(--danger);}
  .fi::placeholder{color:var(--muted);}
  .fi-sel{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.72rem .95rem;border-radius:var(--r);font-family:var(--font-b);font-size:.88rem;outline:none;transition:border-color var(--tr);cursor:pointer;}
  .fi-sel:focus{border-color:var(--accent);}
  .fi-sel option{background:var(--surface);}
  .note-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.9rem 1rem;font-size:.76rem;color:var(--muted);display:flex;gap:.5rem;align-items:flex-start;margin-top:.8rem;}
  .form-actions{display:flex;justify-content:space-between;align-items:center;margin-top:1.6rem;}
  .btn-p{background:var(--accent);color:#0b0b0b;padding:.88rem 2rem;border:none;border-radius:var(--r);font-family:var(--font-b);font-size:.76rem;letter-spacing:.14em;text-transform:uppercase;font-weight:500;cursor:pointer;transition:all var(--tr);}
  .btn-p:hover{background:var(--accent2);}
  .btn-o{background:transparent;border:1px solid var(--border);color:var(--text);padding:.85rem 1.6rem;border-radius:var(--r);font-family:var(--font-b);font-size:.74rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all var(--tr);text-decoration:none;display:inline-block;}
  .btn-o:hover{border-color:var(--accent);color:var(--accent);}

  /* PAYMENT ICONS */
  .pay-icons{display:flex;gap:.5rem;margin-bottom:1.3rem;}
  .pay-ic{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.35rem .7rem;font-size:1.1rem;}

  /* REVIEW PANELS */
  .review-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.2rem;margin-bottom:1rem;}
  .rv-label{font-size:.64rem;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:.8rem;display:flex;justify-content:space-between;align-items:center;}
  .rv-edit{color:var(--muted);font-size:.7rem;cursor:pointer;background:none;border:none;font-family:var(--font-b);transition:color var(--tr);}
  .rv-edit:hover{color:var(--accent);}
  .rv-line{font-size:.84rem;color:var(--muted);margin-bottom:.3rem;}
  .rv-line strong{color:var(--text);font-weight:400;}
  .rv-item{display:flex;align-items:center;gap:.8rem;margin-bottom:.75rem;}
  .rv-thumb{font-size:1.5rem;background:var(--card);border:1px solid var(--border);border-radius:var(--r);width:44px;height:44px;display:flex;align-items:center;justify-content:center;}
  .rv-info{flex:1;}
  .rv-name{font-size:.85rem;}
  .rv-qty{font-size:.72rem;color:var(--muted);}
  .rv-price{font-family:var(--font-d);font-size:1rem;color:var(--accent);}

  /* SIDEBAR */
  .sidebar-box{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.6rem;position:sticky;top:86px;}
  .sb-title{font-family:var(--font-d);font-size:1.5rem;margin-bottom:1.4rem;}
  .sb-item{display:flex;align-items:center;gap:.8rem;margin-bottom:.8rem;padding-bottom:.8rem;border-bottom:1px solid var(--border);}
  .sb-item:last-of-type{border-bottom:none;margin-bottom:0;padding-bottom:0;}
  .sb-emoji{font-size:1.4rem;}
  .sb-info{flex:1;}
  .sb-name{font-size:.83rem;}
  .sb-qty{font-size:.7rem;color:var(--muted);}
  .sb-price{font-family:var(--font-d);font-size:1rem;color:var(--accent);}
  .sum-row{display:flex;justify-content:space-between;margin-bottom:.7rem;font-size:.84rem;}
  .sum-row.total{border-top:1px solid var(--border);padding-top:.9rem;margin-top:.5rem;font-size:1rem;font-weight:500;}
  .sum-row.total .val{font-family:var(--font-d);font-size:1.4rem;color:var(--accent);}
  .lbl{color:var(--muted);}
  .free{color:var(--success);}

  /* EMPTY */
  .empty-co{text-align:center;padding:7rem 2rem;}

  /* TOAST */
  #toasts{position:fixed;bottom:2rem;right:2rem;z-index:999;display:flex;flex-direction:column;gap:.5rem;}
  .toast{background:var(--card);border:1px solid var(--accent);color:var(--text);padding:.8rem 1.3rem;border-radius:var(--r);font-size:.82rem;min-width:230px;animation:tin .3s ease,tout .3s ease 2.5s forwards;}
  @keyframes tin{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
  @keyframes tout{to{transform:translateX(120%);opacity:0}}

  footer{border-top:1px solid var(--border);padding:2.5rem 3rem;display:flex;justify-content:space-between;align-items:center;}
  .f-brand{font-family:var(--font-d);font-size:1.5rem;color:var(--accent);}
  .f-links{display:flex;gap:2rem;}
  .f-links a{font-size:.78rem;color:var(--muted);text-decoration:none;transition:color var(--tr);}
  .f-links a:hover{color:var(--accent);}

  @media(max-width:900px){
    nav,.page-hd,div.divider,.step-bar,.co-layout,footer{padding-left:1.2rem;padding-right:1.2rem;}
    .co-layout{grid-template-columns:1fr;}
    .sidebar-box{position:static;}
    .f-row{grid-template-columns:1fr;}
    footer{flex-direction:column;gap:1rem;}
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">AURA</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="cart.html">Cart</a>
  </div>
  <a href="cart.html" class="cart-nav">🛒 Cart <span class="cart-badge" id="cart-badge">0</span></a>
</nav>

<div id="toasts"></div>
<div id="main-co"></div>

<footer>
  <div class="f-brand">AURA</div>
  <div class="f-links">
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="cart.html">Cart</a>
  </div>
</footer>

<script>
  const PRODUCTS=[
    {id:1,name:'Noir Candle Set',category:'Home',price:2499,emoji:'🕯️'},
    {id:2,name:'Matte Leather Wallet',category:'Accessories',price:3899,emoji:'👜'},
    {id:3,name:'Gold Leaf Journal',category:'Stationery',price:1799,emoji:'📓'},
    {id:4,name:'Ceramic Espresso Set',category:'Kitchen',price:4299,emoji:'☕'},
    {id:5,name:'Linen Throw Blanket',category:'Home',price:5499,emoji:'🧣'},
    {id:6,name:'Amber Glass Diffuser',category:'Wellness',price:3199,emoji:'🪔'},
    {id:7,name:'Brass Desk Lamp',category:'Lighting',price:7999,emoji:'💡'},
    {id:8,name:'Merino Wool Beanie',category:'Apparel',price:1499,emoji:'🧢'},
    {id:9,name:'Sandstone Incense Set',category:'Wellness',price:1299,emoji:'🌿'},
    {id:10,name:'Woven Rattan Tray',category:'Home',price:2199,emoji:'🪣'},
  ];

  function getCart(){try{return JSON.parse(localStorage.getItem('aura_cart')||'[]');}catch{return[];}}
  function cartCount(){return getCart().reduce((s,i)=>s+i.qty,0);}
  function cartSubtotal(){return getCart().reduce((s,i)=>{const p=PRODUCTS.find(x=>x.id===i.id);return s+(p?p.price*i.qty:0);},0);}
  function updateBadge(){const b=document.getElementById('cart-badge');if(b)b.textContent=cartCount();}
  function toast(msg){const c=document.getElementById('toasts');const t=document.createElement('div');t.className='toast';t.textContent=msg;c.appendChild(t);setTimeout(()=>t.remove(),3000);}
  function v(id){return(document.getElementById(id)||{}).value||'';}
  function validate(ids){let ok=true;ids.forEach(id=>{const el=document.getElementById(id);if(!el)return;if(!el.value.trim()){el.classList.add('invalid');ok=false;}else el.classList.remove('invalid');});return ok;}

  const cart=getCart();
  updateBadge();

  if(!cart.length){
    document.getElementById('main-co').innerHTML=`
      <div class="empty-co">
        <div style="font-size:4rem;margin-bottom:1.5rem">🛒</div>
        <h2 style="font-family:var(--font-d);font-size:2rem;margin-bottom:1rem">Your cart is empty</h2>
        <p style="color:var(--muted);margin-bottom:2rem">Add items before checking out.</p>
        <a href="shop.html" style="background:var(--accent);color:#0b0b0b;padding:.9rem 2.2rem;border-radius:3px;font-size:.76rem;letter-spacing:.14em;text-transform:uppercase;font-weight:500;text-decoration:none;display:inline-block;">Go to Shop</a>
      </div>`;
  } else {
    let step=1;
    const sub=cartSubtotal();
    const ship=sub>=5000?0:299;
    const tax=Math.round(sub*.18);
    const grand=sub+ship+tax;

    document.getElementById('main-co').innerHTML=`
      <div class="page-hd"><h1>Checkout</h1></div>
      <div class="divider"></div>

      <div class="step-bar">
        <div class="step active" id="sb1"><div class="s-num">1</div><span class="s-lbl">Shipping</span></div>
        <div class="s-line"></div>
        <div class="step" id="sb2"><div class="s-num">2</div><span class="s-lbl">Payment</span></div>
        <div class="s-line"></div>
        <div class="step" id="sb3"><div class="s-num">3</div><span class="s-lbl">Review</span></div>
      </div>

      <div class="co-layout">
        <div>
          <!-- PANEL 1: Shipping -->
          <div class="form-card panel active" id="panel1">
            <h3 class="f-section-ttl">Shipping Information</h3>
            <div class="f-row">
              <div class="fg"><label class="fl">First Name *</label><input class="fi" id="fname" placeholder="John" type="text"></div>
              <div class="fg"><label class="fl">Last Name *</label><input class="fi" id="lname" placeholder="Doe" type="text"></div>
            </div>
            <div class="fg"><label class="fl">Email Address *</label><input class="fi" id="email" placeholder="john@example.com" type="email"></div>
            <div class="fg"><label class="fl">Phone Number</label><input class="fi" id="phone" placeholder="+91 98765 43210" type="tel"></div>
            <div class="fg"><label class="fl">Street Address *</label><input class="fi" id="address" placeholder="123 Main Street, Apt 4B" type="text"></div>
            <div class="f-row">
              <div class="fg"><label class="fl">City *</label><input class="fi" id="city" placeholder="Hyderabad" type="text"></div>
              <div class="fg"><label class="fl">Postal Code *</label><input class="fi" id="zip" placeholder="500001" type="text"></div>
            </div>
            <div class="f-row">
              <div class="fg"><label class="fl">State</label><input class="fi" id="state" placeholder="Telangana" type="text"></div>
              <div class="fg">
                <label class="fl">Country *</label>
                <select class="fi-sel" id="country">
                  <option value="">Select Country</option>
                  <option value="India">India</option>
                  <option value="USA">United States</option>
                  <option value="UK">United Kingdom</option>
                  <option value="Australia">Australia</option>
                  <option value="Canada">Canada</option>
                  <option value="Germany">Germany</option>
                  <option value="UAE">United Arab Emirates</option>
                </select>
              </div>
            </div>
            <div class="note-box">🚚 Estimated delivery: 5–7 business days after dispatch.</div>
            <div class="form-actions">
              <a href="cart.html" class="btn-o">← Back to Cart</a>
              <button class="btn-p" onclick="goStep(2)">Continue to Payment →</button>
            </div>
          </div>

          <!-- PANEL 2: Payment -->
          <div class="form-card panel" id="panel2">
            <h3 class="f-section-ttl">Payment Details</h3>
            <div class="pay-icons"><span class="pay-ic">💳</span><span class="pay-ic">🏦</span><span class="pay-ic">📱</span><span class="pay-ic">🔐</span></div>
            <div class="fg"><label class="fl">Cardholder Name *</label><input class="fi" id="cname" placeholder="John Doe" type="text"></div>
            <div class="fg"><label class="fl">Card Number *</label><input class="fi" id="cnum" placeholder="4111 1111 1111 1111" type="text" maxlength="19" oninput="fmtCard(this)"></div>
            <div class="f-row">
              <div class="fg"><label class="fl">Expiry Date *</label><input class="fi" id="cexp" placeholder="MM / YY" type="text" maxlength="7" oninput="fmtExp(this)"></div>
              <div class="fg"><label class="fl">CVV *</label><input class="fi" id="ccvv" placeholder="• • •" type="password" maxlength="4"></div>
            </div>
            <div class="note-box">🔒 Your payment is protected by 256-bit SSL encryption. Card details are never stored.</div>
            <div class="form-actions">
              <button class="btn-o" onclick="goStep(1)">← Back</button>
              <button class="btn-p" onclick="goStep(3)">Review Order →</button>
            </div>
          </div>

          <!-- PANEL 3: Review -->
          <div class="form-card panel" id="panel3">
            <h3 class="f-section-ttl">Review &amp; Confirm</h3>
            <div id="review-content"></div>
            <div class="form-actions">
              <button class="btn-o" onclick="goStep(2)">← Back</button>
              <button class="btn-p" onclick="placeOrder()">Place Order ✓</button>
            </div>
          </div>
        </div>

        <!-- SIDEBAR -->
        <div>
          <div class="sidebar-box">
            <h3 class="sb-title">Your Order</h3>
            ${cart.map(i=>{const p=PRODUCTS.find(x=>x.id===i.id);return p?`
              <div class="sb-item">
                <div class="sb-emoji">${p.emoji}</div>
                <div class="sb-info"><div class="sb-name">${p.name}</div><div class="sb-qty">×${i.qty}</div></div>
                <div class="sb-price">₹${(p.price*i.qty).toLocaleString()}</div>
              </div>`:''}).join('')}
            <hr style="border-color:var(--border);margin:1rem 0">
            <div class="sum-row"><span class="lbl">Subtotal</span><span>₹${sub.toLocaleString()}</span></div>
            <div class="sum-row"><span class="lbl">Shipping</span><span>${ship===0?'<span class="free">Free</span>':'₹'+ship}</span></div>
            <div class="sum-row"><span class="lbl">GST (18%)</span><span>₹${tax.toLocaleString()}</span></div>
            <div class="sum-row total"><span>Total</span><span class="val">₹${grand.toLocaleString()}</span></div>
          </div>
        </div>
      </div>`;

    function goStep(n){
      if(n===2 && !validate(['fname','lname','email','address','city','zip','country'])){ toast('⚠️ Fill all required fields'); return; }
      if(n===3 && !validate(['cname','cnum','cexp','ccvv'])){ toast('⚠️ Enter payment details'); return; }
      if(n===3) buildReview();
      [1,2,3].forEach(i=>{
        document.getElementById('panel'+i).classList.toggle('active',i===n);
        const sb=document.getElementById('sb'+i);
        sb.classList.remove('active','done');
        if(i<n) sb.classList.add('done');
        if(i===n) sb.classList.add('active');
      });
      step=n;
      window.scrollTo({top:0,behavior:'smooth'});
    }

    function buildReview(){
      const masked='•••• •••• •••• '+v('cnum').replace(/\s/g,'').slice(-4);
      document.getElementById('review-content').innerHTML=`
        <div class="review-box">
          <div class="rv-label">Shipping Address <button class="rv-edit" onclick="goStep(1)">Edit</button></div>
          <p class="rv-line"><strong>${v('fname')} ${v('lname')}</strong></p>
          <p class="rv-line">${v('address')}</p>
          <p class="rv-line">${v('city')}${v('state')?', '+v('state'):''} ${v('zip')}, ${v('country')}</p>
          <p class="rv-line">${v('email')}${v('phone')?' · '+v('phone'):''}</p>
        </div>
        <div class="review-box">
          <div class="rv-label">Payment <button class="rv-edit" onclick="goStep(2)">Edit</button></div>
          <p class="rv-line"><strong>${v('cname')}</strong></p>
          <p class="rv-line">${masked} · Exp ${v('cexp')}</p>
        </div>
        <div class="review-box">
          <div class="rv-label">Items (${cart.reduce((s,i)=>s+i.qty,0)})</div>
          ${cart.map(i=>{const p=PRODUCTS.find(x=>x.id===i.id);return p?`
            <div class="rv-item">
              <div class="rv-thumb">${p.emoji}</div>
              <div class="rv-info"><div class="rv-name">${p.name}</div><div class="rv-qty">Qty: ${i.qty}</div></div>
              <div class="rv-price">₹${(p.price*i.qty).toLocaleString()}</div>
            </div>`:''}).join('')}
        </div>`;
    }

    function placeOrder(){
      const orderId='AURA-'+Math.random().toString(36).substring(2,8).toUpperCase();
      const del=new Date(); del.setDate(del.getDate()+7);
      localStorage.setItem('aura_order',JSON.stringify({
        orderId, grand,
        name:v('fname')+' '+v('lname'),
        email:v('email'),
        address:v('address')+', '+v('city')+' '+v('zip')+', '+v('country'),
        qty:cart.reduce((s,i)=>s+i.qty,0),
        items:cart.length,
        delivery:del.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'})
      }));
      localStorage.removeItem('aura_cart');
      window.location.href='success.html';
    }

    function fmtCard(el){let v=el.value.replace(/\D/g,'').substring(0,16);el.value=v.replace(/(\d{4})(?=\d)/g,'$1 ');}
    function fmtExp(el){let v=el.value.replace(/\D/g,'').substring(0,4);if(v.length>=2)v=v.substring(0,2)+' / '+v.substring(2);el.value=v;}
  }
</script>
</body>
</html>
