<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-E4MCBFBTTZ"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-E4MCBFBTTZ');
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product — AURA</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0b0b0b;--surface:#141414;--card:#1c1c1c;--border:#2a2a2a;--accent:#c9a97f;--accent2:#e8d5b4;--text:#f0ece4;--muted:#7a7672;--font-d:'Cormorant Garamond',serif;--font-b:'DM Sans',sans-serif;--r:3px;--tr:.28s cubic-bezier(.4,0,.2,1);}
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--font-b);font-weight:300;overflow-x:hidden;}

  nav{position:sticky;top:0;z-index:100;background:rgba(11,11,11,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 3rem;height:68px;}
  .logo{font-family:var(--font-d);font-size:1.8rem;font-weight:300;letter-spacing:.3em;color:var(--accent);text-decoration:none;}
  .nav-links{display:flex;gap:2.5rem;align-items:center;}
  .nav-links a{font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color var(--tr);}
  .nav-links a:hover{color:var(--text);}
  .nav-links a.active{color:var(--accent);border-bottom:1px solid var(--accent);padding-bottom:2px;}
  .cart-nav{display:flex;align-items:center;gap:.5rem;text-decoration:none;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.5rem 1.1rem;border-radius:var(--r);font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;transition:all var(--tr);}
  .cart-nav:hover{border-color:var(--accent);color:var(--accent);}
  .cart-badge{background:var(--accent);color:#0b0b0b;border-radius:50%;width:19px;height:19px;font-size:.62rem;font-weight:700;display:flex;align-items:center;justify-content:center;}

  /* BREADCRUMB */
  .breadcrumb{display:flex;align-items:center;gap:.6rem;padding:1.5rem 3rem;font-size:.72rem;color:var(--muted);}
  .breadcrumb a{color:var(--muted);text-decoration:none;transition:color var(--tr);}
  .breadcrumb a:hover{color:var(--accent);}
  .breadcrumb span.sep{color:var(--border);}

  /* PRODUCT DETAIL */
  .detail{display:grid;grid-template-columns:1fr 1fr;gap:4rem;padding:0 3rem 5rem;align-items:start;}

  .img-col{position:sticky;top:86px;}
  .main-img{background:var(--card);border:1px solid var(--border);border-radius:var(--r);height:460px;display:flex;align-items:center;justify-content:center;font-size:10rem;margin-bottom:1rem;transition:border-color var(--tr);}
  .main-img:hover{border-color:var(--accent);}
  .thumbs{display:flex;gap:.75rem;}
  .thumb{flex:1;background:var(--card);border:1px solid var(--border);border-radius:var(--r);height:82px;display:flex;align-items:center;justify-content:center;font-size:2rem;cursor:pointer;transition:all var(--tr);}
  .thumb.active,.thumb:hover{border-color:var(--accent);}

  .info-col{}
  .pcat{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:.9rem;}
  .pname{font-family:var(--font-d);font-size:clamp(2rem,4vw,3.2rem);font-weight:300;line-height:1.1;margin-bottom:.9rem;}
  .pprice{font-family:var(--font-d);font-size:2.4rem;color:var(--accent);margin-bottom:.4rem;}
  .price-note{font-size:.75rem;color:var(--muted);margin-bottom:1.6rem;}

  .divider{height:1px;background:var(--border);margin:1.5rem 0;}

  .pdesc{color:var(--muted);line-height:1.9;font-size:.93rem;margin-bottom:1.6rem;}

  .tags{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:2rem;}
  .tag{border:1px solid var(--border);color:var(--muted);padding:.28rem .75rem;border-radius:99px;font-size:.7rem;transition:all var(--tr);}
  .tag:hover{border-color:var(--accent);color:var(--accent);}

  .qty-row{display:flex;align-items:center;gap:1.5rem;margin-bottom:1.3rem;}
  .qty-lbl{font-size:.7rem;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);}
  .qty-ctrl{display:flex;align-items:center;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
  .q-btn{width:38px;height:38px;background:var(--surface);border:none;color:var(--text);cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:all var(--tr);}
  .q-btn:hover{background:var(--card);color:var(--accent);}
  .q-num{width:46px;height:38px;background:var(--card);border-left:1px solid var(--border);border-right:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.9rem;}

  .actions{display:flex;flex-direction:column;gap:.8rem;margin-bottom:2rem;}
  .btn-add{width:100%;background:var(--accent);color:#0b0b0b;padding:1rem;border:none;border-radius:var(--r);font-family:var(--font-b);font-size:.8rem;letter-spacing:.15em;text-transform:uppercase;font-weight:500;cursor:pointer;transition:all var(--tr);}
  .btn-add:hover{background:var(--accent2);transform:translateY(-2px);box-shadow:0 10px 30px rgba(201,169,127,.25);}
  .btn-now{width:100%;background:transparent;border:1px solid var(--border);color:var(--text);padding:.95rem;border-radius:var(--r);font-family:var(--font-b);font-size:.8rem;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:all var(--tr);text-decoration:none;display:block;text-align:center;}
  .btn-now:hover{border-color:var(--accent);color:var(--accent);}

  .perks{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;}
  .perk{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.8rem 1rem;font-size:.75rem;color:var(--muted);display:flex;align-items:center;gap:.6rem;}

  /* RELATED */
  .related{padding:0 3rem 5rem;}
  .rel-title{font-family:var(--font-d);font-size:2rem;font-weight:300;margin-bottom:1.8rem;padding-bottom:.8rem;border-bottom:1px solid var(--border);}
  .pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1.5rem;}
  .pcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;text-decoration:none;color:inherit;display:block;transition:all var(--tr);}
  .pcard:hover{border-color:var(--accent);transform:translateY(-5px);box-shadow:0 16px 48px rgba(0,0,0,.5);}
  .rimg{height:180px;display:flex;align-items:center;justify-content:center;font-size:3.5rem;background:var(--surface);position:relative;}
  .rbadge{position:absolute;top:.8rem;left:.8rem;background:var(--accent);color:#0b0b0b;font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;padding:.2rem .55rem;border-radius:var(--r);font-weight:600;}
  .rinfo{padding:1.1rem;}
  .rcat{font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:.3rem;}
  .rname{font-size:.95rem;font-weight:400;margin-bottom:.8rem;}
  .rfoot{display:flex;align-items:center;justify-content:space-between;}
  .rprice{font-family:var(--font-d);font-size:1.3rem;color:var(--accent);}
  .radd{background:transparent;border:1px solid var(--accent);color:var(--accent);padding:.38rem .85rem;border-radius:var(--r);font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all var(--tr);font-family:var(--font-b);}
  .radd:hover{background:var(--accent);color:#0b0b0b;}

  /* NOT FOUND */
  .not-found{text-align:center;padding:8rem 2rem;}
  .nf-icon{font-size:4rem;margin-bottom:1.5rem;}
  .nf-title{font-family:var(--font-d);font-size:2.5rem;margin-bottom:1rem;}
  .nf-sub{color:var(--muted);margin-bottom:2rem;}
  .btn-p{background:var(--accent);color:#0b0b0b;padding:.9rem 2.2rem;border:none;border-radius:var(--r);font-family:var(--font-b);font-size:.76rem;letter-spacing:.14em;text-transform:uppercase;font-weight:500;cursor:pointer;text-decoration:none;transition:all var(--tr);display:inline-block;}
  .btn-p:hover{background:var(--accent2);}

  /* TOAST */
  #toasts{position:fixed;bottom:2rem;right:2rem;z-index:999;display:flex;flex-direction:column;gap:.5rem;}
  .toast{background:var(--card);border:1px solid var(--accent);color:var(--text);padding:.8rem 1.3rem;border-radius:var(--r);font-size:.82rem;min-width:230px;animation:tin .3s ease,tout .3s ease 2.5s forwards;}
  @keyframes tin{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
  @keyframes tout{to{transform:translateX(120%);opacity:0}}
  @keyframes fade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  main{animation:fade .35s ease;}

  footer{border-top:1px solid var(--border);padding:2.5rem 3rem;display:flex;justify-content:space-between;align-items:center;}
  .f-brand{font-family:var(--font-d);font-size:1.5rem;color:var(--accent);}
  .f-links{display:flex;gap:2rem;}
  .f-links a{font-size:.78rem;color:var(--muted);text-decoration:none;transition:color var(--tr);}
  .f-links a:hover{color:var(--accent);}

  @media(max-width:800px){
    nav,.breadcrumb,.detail,.related,footer{padding-left:1.2rem;padding-right:1.2rem;}
    .detail{grid-template-columns:1fr;gap:2rem;}
    .img-col{position:static;}
    footer{flex-direction:column;gap:1rem;text-align:center;}
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">AURA</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="shop.html" class="active">Shop</a>
    <a href="cart.html">Cart</a>
  </div>
  <a href="cart.html" class="cart-nav">🛒 Cart <span class="cart-badge" id="cart-badge">0</span></a>
</nav>

<div id="toasts"></div>
<main id="main"></main>

<footer>
  <div class="f-brand">AURA</div>
  <div class="f-links">
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="cart.html">Cart</a>
  </div>
</footer>

<script>
  const PRODUCTS = [
    {id:1,name:'Noir Candle Set',category:'Home',price:2499,emoji:'🕯️',badge:'Bestseller',desc:'Hand-poured soy wax candles in obsidian vessels. Scented with cedarwood and vetiver. Burn time 45 hours each.',tags:['Home Decor','Handmade','Sustainable']},
    {id:2,name:'Matte Leather Wallet',category:'Accessories',price:3899,emoji:'👜',badge:'New',desc:'Full-grain Italian leather bifold. Slim profile, 6 card slots, hidden zip pocket. Ages beautifully over time.',tags:['Leather','Minimalist','Unisex']},
    {id:3,name:'Gold Leaf Journal',category:'Stationery',price:1799,emoji:'📓',badge:null,desc:'A5 dot-grid journal with a gold foil-pressed cover. 200 pages of 100gsm acid-free cream paper.',tags:['Stationery','Gift','Premium']},
    {id:4,name:'Ceramic Espresso Set',category:'Kitchen',price:4299,emoji:'☕',badge:'Limited',desc:'Set of 2 hand-thrown espresso cups with saucers. Matte black with a raw clay rim. Dishwasher safe.',tags:['Ceramics','Kitchen','Artisan']},
    {id:5,name:'Linen Throw Blanket',category:'Home',price:5499,emoji:'🧣',badge:null,desc:'100% Belgian linen, natural undyed weave. Naturally cooling, softens with every wash. 130×170cm.',tags:['Linen','Bedroom','Neutral']},
    {id:6,name:'Amber Glass Diffuser',category:'Wellness',price:3199,emoji:'🪔',badge:'New',desc:'Reed diffuser in hand-blown amber bottle. 150ml, notes of sandalwood and white tea. Lasts 3 months.',tags:['Wellness','Fragrance','Gift']},
    {id:7,name:'Brass Desk Lamp',category:'Lighting',price:7999,emoji:'💡',badge:null,desc:'Articulated brass arm desk lamp with a linen shade. Adjustable angle, vintage Edison bulb included.',tags:['Lighting','Office','Vintage']},
    {id:8,name:'Merino Wool Beanie',category:'Apparel',price:1499,emoji:'🧢',badge:null,desc:'Extra-fine 100% merino wool. One size, ribbed fit. Naturally odour-resistant and temperature-regulating.',tags:['Apparel','Winter','Sustainable']},
    {id:9,name:'Sandstone Incense Set',category:'Wellness',price:1299,emoji:'🌿',badge:null,desc:'Box of 40 hand-rolled incense sticks in 4 scents. Comes with a carved soapstone holder.',tags:['Wellness','Ritual','Artisan']},
    {id:10,name:'Woven Rattan Tray',category:'Home',price:2199,emoji:'🪣',badge:'Bestseller',desc:'Handwoven from sustainably sourced rattan. Perfect for organising countertops. 35×25cm.',tags:['Home','Natural','Handmade']},
  ];

  function getCart(){try{return JSON.parse(localStorage.getItem('aura_cart')||'[]');}catch{return[];}}
  function saveCart(c){localStorage.setItem('aura_cart',JSON.stringify(c));}
  function addToCart(id,qty=1){const c=getCart();const ex=c.find(i=>i.id===id);if(ex)ex.qty+=qty;else c.push({id,qty});saveCart(c);updateBadge();}
  function cartCount(){return getCart().reduce((s,i)=>s+i.qty,0);}
  function updateBadge(){const b=document.getElementById('cart-badge');if(b)b.textContent=cartCount();}
  function toast(msg){const c=document.getElementById('toasts');const t=document.createElement('div');t.className='toast';t.textContent=msg;c.appendChild(t);setTimeout(()=>t.remove(),3000);}

  const id=parseInt(new URLSearchParams(window.location.search).get('id'));
  const p=PRODUCTS.find(x=>x.id===id);
  let qty=1;

  if(!p){
    document.getElementById('main').innerHTML=`
      <div class="not-found">
        <div class="nf-icon">🔍</div>
        <h2 class="nf-title">Product Not Found</h2>
        <p class="nf-sub">This item doesn't exist or may have been removed.</p>
        <a href="shop.html" class="btn-p">Back to Shop</a>
      </div>`;
  } else {
    document.title=`${p.name} — AURA`;

    document.getElementById('main').innerHTML=`
      <div class="breadcrumb">
        <a href="index.html">Home</a><span class="sep">/</span>
        <a href="shop.html">Shop</a><span class="sep">/</span>
        <span>${p.name}</span>
      </div>
      <div class="detail">
        <div class="img-col">
          <div class="main-img">${p.emoji}</div>
          <div class="thumbs">
            <div class="thumb active">${p.emoji}</div>
            <div class="thumb">${p.emoji}</div>
            <div class="thumb">${p.emoji}</div>
          </div>
        </div>
        <div class="info-col">
          <p class="pcat">${p.category}</p>
          <h1 class="pname">${p.name}</h1>
          <p class="pprice">₹${p.price.toLocaleString()}</p>
          <p class="price-note">Inclusive of all taxes · Free shipping over ₹5,000</p>
          <div class="divider"></div>
          <p class="pdesc">${p.desc}</p>
          <div class="tags">${p.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
          <div class="qty-row">
            <span class="qty-lbl">Quantity</span>
            <div class="qty-ctrl">
              <button class="q-btn" onclick="changeQty(-1)">−</button>
              <div class="q-num" id="q-num">1</div>
              <button class="q-btn" onclick="changeQty(1)">+</button>
            </div>
          </div>
          <div class="actions">
            <button class="btn-add" onclick="handleAdd()">Add to Cart</button>
            <a href="cart.html" class="btn-now" id="buy-now" onclick="handleAdd()">Buy Now →</a>
          </div>
          <div class="perks">
            <div class="perk">🚚 Free shipping over ₹5k</div>
            <div class="perk">↩️ 30-day returns</div>
            <div class="perk">🔒 Secure checkout</div>
            <div class="perk">🎁 Gift wrapping</div>
          </div>
        </div>
      </div>`;

    // Related products
    const related=PRODUCTS.filter(x=>x.id!==p.id&&x.category===p.category).slice(0,4);
    if(related.length){
      const relSection=document.createElement('div');
      relSection.className='related';
      relSection.innerHTML=`
        <h2 class="rel-title">You Might Also Like</h2>
        <div class="pgrid">${related.map(r=>`
          <a href="product.html?id=${r.id}" class="pcard">
            <div class="rimg">${r.badge?`<div class="rbadge">${r.badge}</div>`:''}${r.emoji}</div>
            <div class="rinfo">
              <p class="rcat">${r.category}</p>
              <p class="rname">${r.name}</p>
              <div class="rfoot">
                <span class="rprice">₹${r.price.toLocaleString()}</span>
                <button class="radd" onclick="event.preventDefault();event.stopPropagation();addToCart(${r.id});toast('${r.emoji} Added!')">Add</button>
              </div>
            </div>
          </a>`).join('')}
        </div>`;
      document.getElementById('main').appendChild(relSection);
    }
  }

  function changeQty(d){qty=Math.max(1,qty+d);const el=document.getElementById('q-num');if(el)el.textContent=qty;}
  function handleAdd(){addToCart(p.id,qty);toast(`${p.emoji} ${p.name} ×${qty} added to cart!`);}

  updateBadge();
</script>
</body>
</html>
